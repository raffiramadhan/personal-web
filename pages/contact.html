<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Web Pribadi</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/contact.css">
</head>
<body>
    <header class="header">
        <a class="logo" href="../index.html">Raffi Ramadhan</a>

        <div class="menubar" tabindex="0">
            <button class="menu"><img src="../img/hamburger.png" alt="hamburger_menu" width="25px"></button>

            <ul class="menulist">
                <li><a href="../index.html">Beranda</a></li>
                <li><a href="profile.html">Profil</a></li>
                <li><a href="about.html">Tentang</a></li>
                <li><a href="gallery.html">Galeri</a></li>
                <li><a id="on-menu" href="contact.html">Kontak</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div class="section-1">
            <h1>Hubungi Saya</h1>
            <p>Silahkan kirim pesan, saya akan dengan senang hati membalasnya!</p>
        </div>

        <div class="section-2">
            <div class="s2-box">
                <div class="cta-container">
                    <form action="/contact" method="POST">
                        <div class="user-details">
                            <div class="input-box">
                                <label for="name">Nama:</label>
                                <input type="text" id="name" name="name" placeholder="Masukkan nama Anda" required>
                            </div>
                            
                            <div class="input-box">
                                <label for="email">Email:</label>
                                <input type="email" id="email" name="email" placeholder="Masukkan email Anda" required>
                            </div>

                            <div class="input-box">
                                <label for="message">Pesan:</label>
                                <textarea name="message" id="message" placeholder="Tulis pesan Anda..." required></textarea>
                            </div>
                        </div>
                        <div class="button">
                            <button class="submit" type="submit">Kirim Pesan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Copyright &copy; 2026 Raffi Ramadhan</p>
    </footer>
</body>
</html>
